name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup GCloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and Deploy to Cloud Run
        run: |
          set -euo pipefail
          
          SERVICE=balance-web
          REGION=${{ secrets.GCP_REGION }}
          PROJECT=${{ secrets.GCP_PROJECT_ID }}
          REPO=balance-web
          
          # Modern Artifact Registry URL
          IMAGE="$REGION-docker.pkg.dev/$PROJECT/$REPO/$SERVICE:${{ github.sha }}"
          
          # 1. Build the image and push to Artifact Registry
          gcloud builds submit --tag "$IMAGE" --project "$PROJECT"
          
          # 2. Deploy the newly built image
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT" \
            --allow-unauthenticated \
            --set-env-vars="TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}"
